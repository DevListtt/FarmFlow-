name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker compose -p farmflowci -f docker/docker-compose.local.yml build backend

      - name: Run unit tests
        run: docker compose -p farmflowci -f docker/docker-compose.local.yml run --rm --no-deps backend python -m unittest discover -s tests

      - name: Clean Docker resources
        if: always()
        run: docker compose -p farmflowci -f docker/docker-compose.local.yml down -v --remove-orphans

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker compose -p farmflowci -f docker/docker-compose.local.yml build frontend

      - name: Run Next.js build
        run: docker compose -p farmflowci -f docker/docker-compose.local.yml run --rm --no-deps frontend npm run build

      - name: Clean Docker resources
        if: always()
        run: docker compose -p farmflowci -f docker/docker-compose.local.yml down -v --remove-orphans
